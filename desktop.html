<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop — Access OS</title>
  <meta name="description" content="Access OS Desktop Environment.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
</head>

<body>
  <!-- Background Image -->
  <div class="bg-effects" id="bgEffects"
    style="background: url('img/black_wallpaper.png') center/cover no-repeat; opacity: 1;">
  </div>

  <!-- Settings Drawer for changing Animated Background Themes -->
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-drawer" id="settingsDrawer">
    <div class="drawer-header">
      <h2>⚙ Settings</h2>
      <button class="drawer-close" id="settingsClose">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="settings-section">
        <h3>Background Theme</h3>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">Change your animated
          background colors.</p>
        <div class="theme-grid">
          <button class="theme-swatch active" data-theme="default">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#6c5ce7"></span>
              <span class="swatch-dot" style="background:#a29bfe"></span>
              <span class="swatch-dot" style="background:#74b9ff"></span>
            </div>
            Amethyst
          </button>
          <button class="theme-swatch" data-theme="ocean">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#0984e3"></span>
              <span class="swatch-dot" style="background:#74b9ff"></span>
              <span class="swatch-dot" style="background:#00cec9"></span>
            </div>
            Ocean
          </button>
          <button class="theme-swatch" data-theme="sunset">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#e17055"></span>
              <span class="swatch-dot" style="background:#fab1a0"></span>
              <span class="swatch-dot" style="background:#fdcb6e"></span>
            </div>
            Sunset
          </button>
          <button class="theme-swatch" data-theme="forest">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#00b894"></span>
              <span class="swatch-dot" style="background:#55efc4"></span>
              <span class="swatch-dot" style="background:#81ecec"></span>
            </div>
            Forest
          </button>
          <button class="theme-swatch" data-theme="cherry">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#d63031"></span>
              <span class="swatch-dot" style="background:#ff7675"></span>
              <span class="swatch-dot" style="background:#fd79a8"></span>
            </div>
            Cherry
          </button>
          <button class="theme-swatch" data-theme="midnight">
            <div class="swatch-colors">
              <span class="swatch-dot" style="background:#2d3436"></span>
              <span class="swatch-dot" style="background:#636e72"></span>
              <span class="swatch-dot" style="background:#b2bec3"></span>
            </div>
            Midnight
          </button>
        </div>
      </div>

      <!-- Custom Wallpaper Section -->
      <div class="settings-section" style="margin-top: 2rem;">
        <h3>Custom Wallpaper</h3>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">Upload an image from your
          computer to use as the background.</p>
        <label for="wallpaperUpload" class="btn btn-secondary"
          style="width: 100%; display: flex; justify-content: center; cursor: pointer; text-align: center;">
          📸 Choose Image
        </label>
        <input type="file" id="wallpaperUpload" accept="image/*" style="display: none;">
        <button id="resetWallpaper" class="btn btn-secondary"
          style="width: 100%; display: flex; justify-content: center; margin-top: 10px;">
          🔄 Reset Default
        </button>
      </div>
    </div>
  </div>

  <!-- Desktop Environment -->
  <div class="desktop-wrapper">
    <!-- Desktop Icons Area -->
    <div class="desktop-grid">
      <a href="index.html" class="desktop-icon">
        <div class="icon-img blue">🚀</div>
        <div class="icon-text">Home</div>
      </a>
      <a href="#" class="desktop-icon" onclick="openApp('Games', 'games.html', '🎮'); return false;">
        <div class="icon-img blue">🎮</div>
        <div class="icon-text">Games</div>
      </a>
      <a href="#" class="desktop-icon" onclick="openApp('Proxy', 'proxy.html', '🌐'); return false;">
        <div class="icon-img green">🌐</div>
        <div class="icon-text">Proxy</div>
      </a>
      <a href="#" class="desktop-icon" onclick="openApp('Music', 'music.html', '🎵'); return false;">
        <div class="icon-img pink">🎵</div>
        <div class="icon-text">Music</div>
      </a>
    </div>

    <!-- Window Container -->
    <div id="windowContainer"></div>

    <!-- Taskbar -->
    <div class="desktop-taskbar">
      <div class="taskbar-left">
        <a href="index.html" class="taskbar-btn" title="Start / Home">💻</a>
      </div>
      <div class="taskbar-right">
        <button class="taskbar-btn" id="settingsBtn" title="Theme Settings">⚙</button>
        <div class="taskbar-clock" id="taskbarClock">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
