<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — Access OS</title>
  <meta name="description" content="Play unblocked games instantly in your browser. No downloads required.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
  <div class="bg-effects">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">🚀</div>
      Access OS
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="games.html" class="active">Games</a></li>
      <li><a href="proxy.html">Proxy</a></li>
      <li><a href="music.html">Music</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="nav-settings-btn" id="settingsBtn" aria-label="Settings">⚙</button>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu">☰</button>
    </div>
  </nav>

  <!-- Settings Drawer -->
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-drawer" id="settingsDrawer">
    <div class="drawer-header">
      <h2>⚙ Settings</h2>
      <button class="drawer-close" id="settingsClose">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="settings-section">
        <h3>Theme</h3>
        <div class="theme-grid">
          <button class="theme-swatch active" data-theme="default"><div class="swatch-colors"><span class="swatch-dot" style="background:#6c5ce7"></span><span class="swatch-dot" style="background:#a29bfe"></span><span class="swatch-dot" style="background:#74b9ff"></span></div>Amethyst</button>
          <button class="theme-swatch" data-theme="ocean"><div class="swatch-colors"><span class="swatch-dot" style="background:#0984e3"></span><span class="swatch-dot" style="background:#74b9ff"></span><span class="swatch-dot" style="background:#00cec9"></span></div>Ocean</button>
          <button class="theme-swatch" data-theme="sunset"><div class="swatch-colors"><span class="swatch-dot" style="background:#e17055"></span><span class="swatch-dot" style="background:#fab1a0"></span><span class="swatch-dot" style="background:#fdcb6e"></span></div>Sunset</button>
          <button class="theme-swatch" data-theme="forest"><div class="swatch-colors"><span class="swatch-dot" style="background:#00b894"></span><span class="swatch-dot" style="background:#55efc4"></span><span class="swatch-dot" style="background:#81ecec"></span></div>Forest</button>
          <button class="theme-swatch" data-theme="cherry"><div class="swatch-colors"><span class="swatch-dot" style="background:#d63031"></span><span class="swatch-dot" style="background:#ff7675"></span><span class="swatch-dot" style="background:#fd79a8"></span></div>Cherry</button>
          <button class="theme-swatch" data-theme="midnight"><div class="swatch-colors"><span class="swatch-dot" style="background:#2d3436"></span><span class="swatch-dot" style="background:#636e72"></span><span class="swatch-dot" style="background:#b2bec3"></span></div>Midnight</button>
        </div>
      </div>
    </div>
  </div>

  <main class="main-content">
    <div class="page-header">
      <h1>🎮 Unblocked Games</h1>
      <p>Click any game to play instantly in your browser</p>
    </div>

    <div class="games-container">
      <div class="games-search">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="gameSearch" placeholder="Search games...">
        </div>
      </div>

      <div class="category-tabs">
        <button class="category-tab active" data-cat="all">All</button>
        <button class="category-tab" data-cat="action">Action</button>
        <button class="category-tab" data-cat="puzzle">Puzzle</button>
        <button class="category-tab" data-cat="arcade">Arcade</button>
        <button class="category-tab" data-cat="sports">Sports</button>
        <button class="category-tab" data-cat="io">IO Games</button>
      </div>

      <div class="games-grid" id="gamesGrid"></div>
    </div>
  </main>

  <div class="game-modal" id="gameModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Game</h3>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
      </div>
      <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </div>
  </div>

  <footer class="footer">
    <p>Access OS &copy; 2026 — Built for the community</p>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/games.js"></script>
</body>
</html>
